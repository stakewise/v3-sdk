query SubVaults(
  $skip: Int!
  $first: Int!
  $metaVaultAddress: Bytes!
) {
  vaults(
    skip: $skip
    first: $first
    orderBy: id
    where: { metaVaults_contains: [ $metaVaultAddress ] }
  ) {
    id
    displayName
    imageUrl
    allocators(where: { address: $metaVaultAddress }) {
      apy
      assets
    }
    exitRequests(where: { receiver: $metaVaultAddress, isClaimed: false }) {
      totalAssets
    }
  }
}
