query Vault($address: ID!) {
  vault(id: $address) {
    address: id
    performance: score
    osTokenConfig {
      ltvPercent
      liqThresholdPercent
    }
    apy
    admin
    version
    isErc20
    baseApy
    imageUrl
    capacity
    mevEscrow
    isPrivate
    createdAt
    mevEscrow
    tokenName
    isGenesis
    canHarvest
    feePercent
    isMetaVault
    totalAssets
    isBlocklist
    displayName
    description
    whitelister
    tokenSymbol
    feeRecipient
    queuedShares
    exitingAssets
    lastFeePercent
    blocklistCount
    whitelistCount
    exitingTickets
    depositDataRoot
    isCollateralized
    blocklistManager
    ejectingSubVault
    validatorsManager
    subVaultsRegistry
    depositDataManager
    pendingMetaSubVault
    allocatorMaxBoostApy
    lastFeeUpdateTimestamp
  }
}
